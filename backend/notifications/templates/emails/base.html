<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />

  <body

  >
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center">
          <table
            width="600"
            style="background: #ffffff; border-radius: 8px; padding: 24px"
          >
            <!-- Header -->
            <tr>
              <td
                style="text-align: center; font-size: 22px; font-weight: bold"
              >
                🐾 Pet Rescue
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding-top: 20px; font-size: 15px; color: #333">
                {{ content }}
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                style="
                  padding-top: 30px;
                  font-size: 12px;
                  color: #777;
                  text-align: center;
                "
              >
                This is an automated message. Please do not reply.<br />
                © Pet Rescue
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>

</html>
